name: Build Mac App

on:
  workflow_dispatch:

permissions:
  contents: write        # 加这个，允许创建 Release

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install pyinstaller xmind xmindparser

      - name: 打包
        run: |
          pyinstaller --onefile --windowed \
            --hidden-import xmind \
            --hidden-import xmindparser \
            --name "XmindParser" \
            xmind.py

      - name: 压缩
        run: cd dist && zip -r XmindParser-mac.zip XmindParser

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dist/XmindParser-mac.zip
